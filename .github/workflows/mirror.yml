name: mirror

on:
  workflow_dispatch:       # triggered by cron-job.org (and the manual "Run" button)
  schedule:
    - cron: "*/30 * * * *" # backup only, in case cron-job.org misses a beat

# Needed so the job can push the updated state file, and read GitHub Models.
permissions:
  contents: write
  models: read

# Never let two runs overlap.
concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Always read the LATEST saved state from main, even on a re-run of an old
      # run, so the bot never re-processes (and re-posts) old messages.
      - name: Sync latest state
        run: |
          git fetch origin main --depth=1 || true
          git checkout origin/main -- state 2>/dev/null || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ffmpeg is preinstalled on ubuntu-latest; this guarantees it for video watermarking.
      - name: Ensure ffmpeg
        run: ffmpeg -version >/dev/null 2>&1 || sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: pip install -r requirements.txt

      - name: Run mirror bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          SOURCE_CHANNEL: ${{ vars.SOURCE_CHANNEL }}
          TARGET_CHANNEL: ${{ vars.TARGET_CHANNEL }}
          SOURCE_USERNAME: ${{ vars.SOURCE_USERNAME }}
          TARGET_HANDLE: "@RadioBulletin"
          FOOTER: "@RadioBulletin | رادیو بولتن"
          LOG_CHANNEL: "@AnalyzeAistrb"     # per-post analytics report channel ("" to disable)
          REPORT_TZ: "Asia/Tehran"          # timezone used in the report timestamp
          TRANSLATOR: "github"
          # Translation fallback chain, best Persian first. Format: backend:model
          #   github:<id>  -> GitHub Models (needs GH_MODELS_TOKEN)
          #   gemini:<id>  -> Google Gemini (needs GEMINI_API_KEY); big daily quota
          #   google:translate -> free Google Translate, plain-text final safety net
          # A wrong/retired/limited entry is skipped automatically.
          CHAIN: "github:openai/gpt-4.1,github:openai/gpt-4o,gemini:gemini-2.5-flash,github:openai/gpt-4.1-mini,github:openai/gpt-4o-mini,github:deepseek/DeepSeek-V3-0324,github:meta/Llama-3.3-70B-Instruct,github:mistral-ai/Mistral-Large-2411,google:translate"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RUN_BUDGET: "600"               # 10 min cap per run (keep BELOW your trigger interval)
          # Watermark: set the variable WATERMARK=on and add watermark/logo.png to enable.
          WATERMARK: ${{ vars.WATERMARK }}
          LOGO_PATH: "watermark/logo.png"
          WM_POSITION: "center"
          WM_SCALE: "0.16"                # logo width as a fraction of the media WIDTH
          WM_OPACITY: "0.85"
          # Either a fine-grained PAT with `models: read` as GH_MODELS_TOKEN,
          # or rely on the built-in token (works thanks to `models: read` above).
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN || secrets.GITHUB_TOKEN }}
        run: python bot.py

      - name: Save progress
        if: always()   # save even if a post failed, so the checkpoint isn't lost
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A state || true
          if git diff --cached --quiet; then echo "no state changes"; exit 0; fi
          git commit -m "update state [skip ci]"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo "state pushed"; exit 0; fi
            echo "push rejected; reconciling with remote (attempt $i)"
            ours=$(cat state/last_id.txt 2>/dev/null || echo 0)
            git fetch origin main || true
            git reset --hard origin/main
            theirs=$(cat state/last_id.txt 2>/dev/null || echo 0)
            max=$ours; [ "$theirs" -gt "$ours" ] 2>/dev/null && max=$theirs
            echo "$max" > state/last_id.txt
            git add -A state || true
            if git diff --cached --quiet; then echo "remote already current"; exit 0; fi
            git commit -m "update state [skip ci]"
          done
          echo "Could not push state after retries; next run will reconcile."
          exit 0   # never fail the whole job just because of a state push race
